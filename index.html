<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Docker Library | 50+ Production-Ready Stacks</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <!-- HEADER -->
    <header class="main-header">
        <div class="container-fluid">
            <div class="logo">
                <span class="logo-icon">🐳</span>
                <span class="logo-text">The Docker Library</span>
            </div>
            
            <div class="auth-section">
                <button id="login-btn" class="btn btn-primary">
                    <span>🔐</span> Sign In
                </button>
                <div id="user-info" style="display: none;">
                    <span id="user-email" class="user-email"></span>
                    <button id="logout-btn" class="btn btn-secondary">Sign Out</button>
                </div>
            </div>
        </div>
    </header>

    <!-- FILTERS BAR (HORIZONTAL) -->
    <section class="filters-bar">
        <div class="container-fluid">
            <div class="filters-row">
                <!-- Search -->
                <div class="filter-group">
                    <input 
                        type="text" 
                        id="search-input" 
                        class="search-input" 
                        placeholder="🔍 Search templates..."
                    >
                </div>
                
                <!-- Port Range -->
                <div class="filter-group">
                    <select id="port-range-filter" class="filter-select">
                        <option value="all">All Port Ranges</option>
                    </select>
                </div>
                
                <!-- Category -->
                <div class="filter-group">
                    <select id="category-filter" class="filter-select">
                        <option value="all">All Categories</option>
                    </select>
                </div>
                
                <!-- Clear -->
                <div class="filter-group">
                    <button id="clear-filters-btn" class="btn btn-ghost">
                        Clear Filters
                    </button>
                </div>
            </div>
            
            <!-- Tech Filters (Horizontal Scrollable) -->
            <div class="tech-filters-row">
                <label class="filter-label">Technologies:</label>
                <div id="tech-filters" class="tech-filters-scroll"></div>
            </div>
        </div>
    </section>

    <!-- TEMPLATES GRID -->
    <section class="templates-section">
        <div class="container-fluid">
            <div class="section-header">
                <h2 id="templates-count">50 templates</h2>
                <p class="subtitle">Production-ready Docker Compose stacks</p>
            </div>
            
            <div id="templates-grid" class="templates-grid">
                <!-- Cards loaded by JS -->
            </div>
        </div>
    </section>

    <!-- SCRIPTS -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
